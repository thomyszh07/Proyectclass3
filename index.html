<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Dado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎲 Simulador de Dado</h1>

    <p>
        Este simulador utiliza un algoritmo pseudoaleatorio para generar
        valores entre 1 y 6 y representarlos visualmente.
    </p>

    <div id="dado">⚀</div>

    <h2>Resultado: <span id="resultado">1</span></h2>

    <button onclick="lanzarDado()">Lanzar Dado</button>

    <h3>Frecuencia de Resultados</h3>

    <ul id="frecuencias">
        <li>1: 0</li>
        <li>2: 0</li>
        <li>3: 0</li>
        <li>4: 0</li>
        <li>5: 0</li>
        <li>6: 0</li>
    </ul>

    <script src="script.js"></script>

</body>
</html>

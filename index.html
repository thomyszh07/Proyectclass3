<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica del documento -->
    <meta charset="UTF-8">
    <!-- Hace que la página sea adaptable a dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título que aparece en la pestaña del navegador -->
    <title>Simulador de Dado</title>

    <!-- Vincula el archivo CSS para los estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Título principal de la página -->
    <h1>🎲 Simulador de Dado</h1>

    <!-- Descripción breve del funcionamiento del simulador -->
    <p>
        Este simulador utiliza un algoritmo pseudoaleatorio para generar
        valores entre 1 y 6 y representarlos visualmente.
    </p>

    <!-- Contenedor donde se muestra visualmente la cara del dado -->
    <div id="dado">⚀</div>

    <!-- Muestra el resultado actual obtenido -->
    <h2>
        Resultado:
        <!-- El número cambia dinámicamente con JavaScript -->
        <span id="resultado">1</span>
    </h2>

    <!-- Botón que ejecuta la función lanzarDado() al hacer clic -->
    <button onclick="lanzarDado()">
        Lanzar Dado
    </button>

    <!-- Título de la sección de estadísticas -->
    <h3>Frecuencia de Resultados</h3>

    <!-- Lista que almacena cuántas veces aparece cada número -->
    <ul id="frecuencias">

        <!-- Frecuencia inicial de cada cara del dado -->
        <li>1: 0</li>
        <li>2: 0</li>
        <li>3: 0</li>
        <li>4: 0</li>
        <li>5: 0</li>
        <li>6: 0</li>

    </ul>

    <!-- Vincula el archivo JavaScript que contiene la lógica del simulador -->
    <script src="script.js"></script>

</body>
</html>
